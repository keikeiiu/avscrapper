# AV Scraper — Web GUI + CLI
# docker compose up              → start web GUI on http://localhost:5000
# docker compose run avscraper python avscraper.py ...  → CLI mode
#
# CLI actions are also available from the web GUI at /actions

services:
  avscraper:
    image: keikeiiu/avscraper:latest
    build: .
    container_name: avscraper
    ports:
      - "5000:5000"
    volumes:
      - ./downloads:/app/downloads
      - ./processed:/app/processed
      - ./reorganized:/app/reorganized
      - ./config.yaml:/app/config.yaml:ro
      - av_data:/app
    environment:
      - AV_CONFIG=/app/config.yaml
    stdin_open: true
    tty: true

volumes:
  av_data:
