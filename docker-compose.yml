# AV Scraper — Web GUI + CLI
# docker compose up -d            → start web GUI (background)
# docker compose run avscraper python avscraper.py ...  → CLI mode
#
# Port: change "8080" to any free port on your host.
# Run `docker ps` or `ss -tlnp` to check what's in use.

services:
  avscraper:
    image: keikeiiu/avscraper:latest
    build: .
    container_name: avscraper
    ports:
      - "3721:5000"
    volumes:
      - ./downloads:/app/downloads
      - ./processed:/app/processed
      - ./reorganized:/app/reorganized
      - ./config.yaml:/app/config.yaml:ro
      - av_data:/app
    environment:
      - AV_CONFIG=/app/config.yaml
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  av_data:
