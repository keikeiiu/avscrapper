# AV Scraper — Web GUI + CLI
# docker compose up -d            → start web GUI (background)
# docker compose run avscraper python avscraper.py ...  → CLI mode
#
# Port: change "8080" to any free port on your host.
# Run `docker ps` or `ss -tlnp` to check what's in use.

services:
  avscraper:
    image: keikeiiu/avscraper:latest
    build: .
    container_name: avscraper
    ports:
      - "3721:3721"
    volumes:
      - ./appdata:/app/appdata         # config, DB, reports
      - ./downloads:/app/downloads     # video source
      - ./processed:/app/processed     # ingest staging
      - ./reorganized:/app/reorganized # final destination
    environment:
      - AV_CONFIG=/app/appdata/config.yaml
    restart: unless-stopped
    stdin_open: true
    tty: true
