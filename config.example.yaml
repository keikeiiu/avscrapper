# AV Scraper — Example Configuration
# Copy to config.yaml and fill in your paths + cookies.

db_path: "./appdata/av_data.db"
report_dir: "./appdata/reports"

# Docker: host mount base for translating container paths to host-accessible paths.
# Example: if your docker-compose mounts /app/downloads ← /mnt/media/JAV
# set host_mount_base: "/mnt/media/JAV"
# host_mount_base: ""

# Ingest — where downloads arrive and where organized files go
ingest:
  source: "./downloads"
  fc2_target: "./processed"
  jav_target: "./processed"

# Reorganize — metadata-driven folder hierarchy
# Duration audit
duration_audit:
  minor_threshold: 30
  hard_threshold: 60

reorganize:
  target: "./reorganized"
  fc2_structure: "FC2/{seller}/{premiered:4}/FC2-PPV-{cid} - {title:50}"
  jav_structure: "JAV/{studio}/{code}/{series:40}/{cid} - {title:50}"
  studio_map:
    # SOD group → canonical
    SODクリエイト: SOD Create
    SODマジックミラー号: SOD Create
    SOD Create: SOD Create
    # PRESTIGE
    プレステージ: PRESTIGE
    PRESTIGE: PRESTIGE
    # WILL group
    S1 NO.1 STYLE: S1 NO.1 STYLE
    アイデアポケット: IDEAPOCKET
    IDEA POCKET: IDEAPOCKET
    IDEAPOCKET: IDEAPOCKET
    MOODYZ: MOODYZ
    MOODYZ DIVA: MOODYZ
    kawaii: kawaii
    カワイイ: kawaii
    Madonna: Madonna
    マドンナ: Madonna
    ATTACKERS: ATTACKERS
    アタッカーズ: ATTACKERS
    FALENO: FALENO
    ファレノ: FALENO
    DAS: DAS
    ダスッ！: DAS
    PREMIUM: PREMIUM
    プレミアム: PREMIUM
    OPPAI: OPPAI
    WANZ: WANZ
    E-BODY: E-BODY
    本中: HND
    HND: HND
    ROCKET: ROCKET
    # Other majors
