  series_map: {}

# Per-site scraper configuration
sites:
  fc2ppvdb:
    base_url: "https://fc2ppvdb.com"
    scrape_delay_seconds: "5-20"
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:135.0) Gecko/20100101 Firefox/135.0"
    cookies:
      # From F12 → Application → Cookies → fc2ppvdb.com
      age_pass: ""
      cf_clearance: ""
      fc2ppvdb_session: ""
      remember_web_xxx: ""
      stype: ""
      XSRF-TOKEN: ""
  javdb:
    base_url: "https://javdb.com"
    scrape_delay_seconds: "5-20"
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:135.0) Gecko/20100101 Firefox/135.0"
    cookies:
      # From F12 → Application → Cookies → javdb.com
      over18: "1"
      _jdb_session: ""
  caribbeancom:
    base_url: "https://www.caribbeancom.com"
    scrape_delay_seconds: "5-20"
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:135.0) Gecko/20100101 Firefox/135.0"
    cookies: {}
